server {
    listen 80;
    server_name localhost;

    # LangGraph FastAPI（你的后端）
    location /v1/ {
        proxy_pass http://host.docker.internal:8000/v1/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # ---- SSO 登录中转页 ----
    # iframe 首次加载此 URL（带 user_email & user_name 查询参数），
    # JS 解码参数 → 写入 Cookie → 302 重定向到 Open WebUI 首页。
    # 后续所有请求浏览器自动携带 Cookie，nginx 从 Cookie 读取用户身份。
    location = /sso-login {
        default_type text/html;
        add_header Cache-Control "no-cache, no-store" always;
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>SSO</title></head><body><p>正在登录...</p><script>!function(){var p=new URLSearchParams(location.search),e=p.get("user_email")||"",n=p.get("user_name")||"";if(!e){document.body.innerHTML="<p>缺少 user_email 参数</p>";return}document.cookie="owui_email="+encodeURIComponent(e)+";path=/;max-age=86400;SameSite=Lax";document.cookie="owui_name="+encodeURIComponent(n)+";path=/;max-age=86400;SameSite=Lax";location.replace("/")}()</script></body></html>';
    }

    # Open WebUI
    location / {
        proxy_pass http://open-webui:8080/;

        # ---- 剥离上游 CSP / X-Frame-Options，替换为我们自己的 ----
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        # 允许 iframe 嵌入
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors *" always;

        # ---- CORS（跨域 iframe 内的请求需要） ----
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "X-User-Email, X-User-Name, Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # 预检请求快速返回
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "X-User-Email, X-User-Name, Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        # ---- Trusted Header SSO（核心机制） ----
        # 优先级：请求头 > Cookie（由 /sso-login 中转页设置）
        # 从 Cookie 读取用户身份（浏览器每次请求自动携带）
        set $final_email $http_x_user_email;
        if ($final_email = "") {
            set $final_email $cookie_owui_email;
        }
        set $final_name $http_x_user_name;
        if ($final_name = "") {
            set $final_name $cookie_owui_name;
        }
        proxy_set_header X-User-Email $final_email;
        proxy_set_header X-User-Name  $final_name;

        # WebSocket 支持（流式输出需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 图片/文件上传（多模态需要）
        client_max_body_size 100M;
    }
}