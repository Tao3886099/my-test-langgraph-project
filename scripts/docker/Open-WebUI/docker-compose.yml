services:
  # Nginx 反向代理
  # 作用：1) 透传业务系统的用户身份头  2) 支持 iframe 嵌入  3) 统一入口
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: unless-stopped
    ports:
      - "1002:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - open-webui

  # Open WebUI —— 微前端嵌入模式
  # 通过 Trusted Header Auth 实现 SSO：业务系统在请求头中传递用户身份，
  # Open WebUI 自动识别/创建用户，无需单独登录。
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # ---- LLM 后端 ----
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - OPENAI_API_KEY=not-needed
      - ENABLE_OLLAMA_API=false

      # ---- Trusted Header SSO（核心） ----
      # 启用认证，但通过信任头自动登录，无需单独注册/登录
      - WEBUI_AUTH=true
      - WEBUI_AUTH_TRUSTED_EMAIL_HEADER=X-User-Email
      - WEBUI_AUTH_TRUSTED_NAME_HEADER=X-User-Name

      # ---- 用户管理 ----
      - ENABLE_SIGNUP=true           # 允许自动创建新用户（首次透传时）
      - DEFAULT_USER_ROLE=user       # 新用户默认角色
      - WEBUI_SECRET_KEY=your-secret-key-change-this  # 生产环境请修改

      # ---- iframe 嵌入支持 ----
      # 允许被业务系统的域名 iframe 嵌入
      # 设置 SameSite=None 以便跨域 iframe 中能正常携带 Cookie
      - WEBUI_SESSION_COOKIE_SAME_SITE=none
      - WEBUI_SESSION_COOKIE_SECURE=true
    volumes:
      - open-webui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  open-webui-data: