version: '3.8'

services:
  lobechat:
    image: lobehub/lobe-chat
    container_name: lobe-chat
    ports:
      - '3210:3210'
    environment:
      # 将 OpenAI 的请求代理到你的 LangGraph FastAPI 服务
      # 默认你本地 FastAPI (uvicorn) 运行在 8000 端口
      # Docker Desktop (Windows/Mac) 环境下可以使用 host.docker.internal 访问宿主机
      - OPENAI_PROXY_URL=http://host.docker.internal:8000/v1
      
      # LobeChat 请求时需要一个 API Key，这里填入一个虚构的 key
      #（只要你的 FastAPI 没有强制校验 Authorization Header 即可）
      - OPENAI_API_KEY=sk-dummy-key
      
      # 暴露给前端的模型列表（可选）
      # LobeChat 会自己去调 `/v1/models` 接口拉取可用模型
      # 使用 `-all` 禁用所有默认内置模型，只保留我们自定义的模型
      - OPENAI_MODEL_LIST=+qwen3.5:35b-a3b-q4_K_M
      
      # 其他可选配置
      - ACCESS_CODE=lobe666 # 页面访问密码，可选配置
    restart: unless-stopped
